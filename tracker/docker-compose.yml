services:
  gqqfm-tracker:
    build: .
    container_name: gqqfm-tracker
    ports:
      - "8502:8502"
    volumes:
      # Bind mount direct sur le disque d'Avignon — survie aux réinstallations Docker
      - ${TRACKER_DATA_DIR:-/home/val/tracker-data}:/data
    environment:
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - DATA_DIR=/data
      - PORT=8502
    restart: unless-stopped
